---
name: 📚 Build - Docs
on:
  push:
    branches:
      - main
      - release-*
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: build (docs)
    runs-on: ubuntu-latest

    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 📦 Install MkDocs
        run: |
          pip install mkdocs mkdocs-readthedocs

      - name: 🔨 Build docs
        run: |
          mkdocs build --strict

      - name: 📤 Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: kadas-docs-html
          path: share/docs/html/
---
name: 📚 Build - Docs
on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-docs:
    name: build (docs)
    runs-on: ubuntu-latest

    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 📦 Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-docs-zensical-${{ hashFiles('zensical.*.toml') }}
          restore-keys: pip-docs-zensical-

      - name: 📦 Install Zensical
        run: pip install zensical

      - name: 🔨 Build docs
        run: python3 scripts/build_docs.py

      - name: 📤 Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: kadas-docs-html
          path: share/docs/html/
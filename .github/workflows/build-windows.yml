---
name: 🪟 Build - Windows
on:
  push:
    branches:
      - main
      - release-*
  pull_request:
  release:
    types: ['published']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    uses: ./.github/workflows/build-docs.yml

  build:
    name: build (windows)
    runs-on: windows-2022

    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v6

      - name: 🐩 Install CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          # Also helps to avoid spurious build failures like https://github.com/qgis/QGIS/pull/47098
          cmakeVersion: 3.31.10

      - name: 🧽 Developer Command Prompt for Microsoft Visual C++
        uses: ilammy/msvc-dev-cmd@v1

      - name: 📦 Prepare msi
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        shell: bash
        run: |
          echo "CREATE_MSI_CMAKE_VAR=-D CREATE_MSI=ON" >> $GITHUB_ENV

      - name: 🔧 Debug options
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'release'
        shell: bash
        run: |
          echo "DEBUG_OPTIONS=-D SHOW_CONSOLE=ON" >> $GITHUB_ENV

      - name: Setup oras
        uses: oras-project/setup-oras@v1

      - name: Fetch tif
        run: |
          oras pull ghcr.io/kadas-albireo/kadas-albireo2/dtm_analysis:1.0 -o .

      - name: 🔢 Determine version
        id: version
        uses: ./.github/actions/determine-version
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🌱 Install dependencies and generate project files
        shell: bash
        env:
          X_VCPKG_ASSET_SOURCES: x-azurl,https://assetcache.open-vcpkg.org/assetcache,,read
        run: |
          cmake -S . \
                -G Ninja \
                -B build \
                -D CMAKE_BUILD_TYPE=Release \
                -D CMAKE_INSTALL_PREFIX="C:\kadas" \
                -D WITH_BINDINGS=ON \
                -D INSTALL_DTM=ON \
                -D INSTALL_ALBIREO_SETTINGS=ON \
                -D VCPKG_TARGET_TRIPLET="x64-windows" \
                -D VCPKG_INSTALL_OPTIONS="--x-buildtrees-root=C:/src;--x-abi-tools-use-exact-versions" \
                -D QGIS_PYTHON_MODULE_DIR="$(pwd)\build\vcpkg_installed\x64-windows\tools\python3\Lib\site-packages\qgis" \
                -D CPACK_PACKAGE_FILE_NAME="kadas-win64-$(date +'%Y-%m-%d_%H%M')" \
                -D NUGET_USERNAME=kadas-albireo \
                -D NUGET_TOKEN=${{ secrets.GITHUB_TOKEN }} \
                -D KADAS_VERSION=${{ steps.version.outputs.version }} \
                ${CREATE_MSI_CMAKE_VAR}\
                ${DEBUG_OPTIONS}

      - name: 📋 Display vcpkg error logs
        if: failure()
        shell: bash
        run: |
          echo "::group::Searching for vcpkg error logs"
          find C:/src -name "*.log" -type f
          echo "::endgroup::"
          for log_file in $(find C:/src -name "*.log" -type f); do
            echo "::group::Contents of $log_file"
            cat "$log_file" || echo "Failed to read $log_file"
            echo "::endgroup::"
          done

      - name: 📑 Upload vcpkg build logs
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: build-logs-x64-windows
          path: |
            C:/src/**/*.log

      - name: 📦 Create SDK
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        shell: bash
        run: |
          ./build/_deps/vcpkg-src/vcpkg.exe export --zip --output-dir=./sdk --x-install-root=build/vcpkg_installed --x-manifest-root=vcpkg
          cd sdk && for f in vcpkg-export-*.zip; do mv "$f" "${f/vcpkg-export/vcpkg-export-${{ matrix.triplet }}}"; done

      - name: 📤 Upload sdk
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: sdk/vcpkg-export-${{ matrix.triplet }}-*.zip

      - name: Compile plugins translation
        shell: bash
        run: |
          # lrelease is run from cmake for app
          # plugins need to be handled
          export PATH="${{ github.workspace }}\build\vcpkg_installed\x64-windows\tools\Qt6\bin:${PATH}"
          for PLUGIN in about gpkg print ephem; do
            lrelease share/python/plugins/kadas_${PLUGIN}/i18n/*.ts
          done

      - name: 🌋 Build
        run: |
          cmake --build build --config Release

      - name: 🧪 Run CTest
        env:
          QT_LOGGING_TO_CONSOLE: "1"
          QT_PLUGIN_PATH: ${{ github.workspace }}/build/vcpkg_installed/x64-windows/Qt6/plugins
        run: |
          ctest --test-dir build --output-on-failure --timeout 120 -C Release

      - name: 📦 Package
        run: |
          cmake --build build --target bundle --config Release

      - name: 📤 Upload portable
        id: upload-portable
        uses: actions/upload-artifact@v7
        with:
          name: kadas-albireo2-portable
          archive: false
          path: |
            build/kadas-*.zip

      - name: 📤 Upload msi
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        uses: actions/upload-artifact@v7
        with:
          name: kadas-albireo2-msi
          archive: false
          path: |
            build/kadas-win64-*.msi

      # A preliminary smoke test to determine basic functional python
      # To be replaced with something proper when testing lands
      - name: 🚭 PySmokeTest
        shell: bash
        env:
          PYTHONPATH: build/output/python/
        run: |
          set -e
          $(./build/vcpkg_installed/x64-windows/tools/python3/python.exe <<EOF
          import os   
          os.add_dll_directory(os.getcwd() + '/build/output/bin')
          from kadas.kadasgui import *
          from kadas.kadascore import *
          from kadas.kadasanalysis import *
          EOF
          )

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: ${{ github.event_name == 'release' }}
        with:
          files: |
            build/kadas-*.zip
            build/kadas-*.msi

      - name: 💬 Sticky comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: windows-artifacts
          message: |
            ## 🪟 Windows Build Artifacts

            📦 [Download portable ZIP](${{ steps.upload-portable.outputs.artifact-url }})

            <sub>Built from ${{ github.event.pull_request.head.sha }} • [Workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>

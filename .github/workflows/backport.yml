name: ♻ Backport
on:
  pull_request_target:
    types:
      - closed
      - labeled

jobs:
  backport:
    runs-on: ubuntu-latest
    name: Backport
    steps:
      - uses: actions/checkout@v7
      - name: Backport
        uses: m-kuhn/backport@v1.2.8
        with:
          github_token: ${{ secrets.GH_GEONINJA_TOKEN }}

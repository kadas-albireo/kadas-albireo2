# ── Theme ──────────────────────────────────────────────────────────────────────
# "classic" matches the Material for MkDocs look-and-feel.
# Switch to "modern" when you're ready to adopt the new Zensical design.
[project.theme]
variant = "classic"

# ── Language selector ──────────────────────────────────────────────────────────
# Renders a language-switcher in the header.
[project.extra]
alternate = [
  { name = "English",  link = "/en/", lang = "en" },
  { name = "Deutsch",  link = "/de/", lang = "de" },
  { name = "Français", link = "/fr/", lang = "fr" },
  { name = "Italiano", link = "/it/", lang = "it" },
]